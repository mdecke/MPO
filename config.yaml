seed : 42
device : cpu

agent :
  policy :
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'tanh'
  
  critic : 
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'elu'
  
buffer :
  batch_size : 256  # Much larger for stable gradients
  buffer_size : 1000000
  td_horizon : 1

training :
  max_iterations : 10000
  warm_up : 1000  # Fill buffer before training
  learning_starts : 1000



