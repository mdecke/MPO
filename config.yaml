environment: 
  seed : 42
  device : cpu
  reward_scale : 10

agent :
  policy :
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'relu'
    layer_norm : true
    gradient_clip : 5.0
    update_delay : 0.1

  critic :
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'relu'
    layer_norm : true
    gradient_clip : 5.0
    ensemble : 3
    bootstrap_p : 0.9
  
  params:
    gamma : 0.99
    tau : 0.95
    policy_samples : 20
    e_step_epsilon : 1 #TODO: what default value
    n_temp_dual_steps : 5
    m_step_epsilon_mu : 0.1
    m_step_epsilon_sigma : 0.0001
    n_kl_dual_steps : 100

buffer :
  batch_size : 256  # Much larger for stable gradients
  buffer_size : 1000000
  td_horizon : 1

training :
  max_interactions : 200000
  warm_up : 1000  # Fill buffer before training
  learning_starts : 5000
  save_checkpoint_rate : 500
  utd_ratio : 3
