environment: 
  seed : 42
  device : cpu

agent :
  policy :
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'tanh'
    gradient_clip : 5.0
    update_delay : 10
  
  critic : 
    hidden_layers : [128, 64, 64]
    lr : 0.0001
    act_fct : 'elu'
    gradient_clip : 5.0 
  
  params:
    gamma : 0.99
    tau : 0.95
    policy_samples : 100
    e_step_epsilon : 1 #TODO: what default value
    n_temp_dual_steps : 200

buffer :
  batch_size : 256  # Much larger for stable gradients
  buffer_size : 1000000
  td_horizon : 1

training :
  max_interactions : 10000
  warm_up : 1000  # Fill buffer before training
  learning_starts : 1000
